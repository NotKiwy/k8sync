name: Stale

on:
  schedule:
    - cron: '0 0 * * *'

jobs:
  stale:
    name: Mark stale issues and PRs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: 'This issue has been inactive for 30 days and will be closed soon.'
          stale-pr-message: 'This PR has been inactive for 14 days and will be closed soon.'
          close-issue-message: 'Closed due to inactivity.'
          close-pr-message: 'Closed due to inactivity.'
          days-before-issue-stale: 30
          days-before-pr-stale: 14
          days-before-issue-close: 7
          days-before-pr-close: 7
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: pinned,security
          exempt-pr-labels: pinned,security
