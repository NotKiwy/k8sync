name: Welcome

on:
  pull_request_target:
    types: [ opened ]
  issues:
    types: [ opened ]

jobs:
  welcome:
    name: Welcome new contributors
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/first-interaction@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            Thanks for opening your first issue! We will get back to you soon.
          pr-message: |
            Thanks for your first pull request! Please make sure CI passes before requesting a review.
