name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7

    - uses: actions/setup-go@v5
      with:
        go-version: '1.26'
        cache: true

    - uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
        components: rustfmt, clippy

    - name: Check Go formatting
      run: |
        if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
          echo "[!] Go files are not formatted"
          gofmt -s -l .
          exit 1
        fi

    - name: Check Rust formatting
      run: cargo fmt --all -- --check

    - name: Run Go vet
      run: go vet ./...

    - name: Run Clippy
      run: cargo clippy --all-targets --all-features -- -D warnings

    - name: Run Go tests with race detector
      run: go test -v -race ./...

    - name: Run Go tests with coverage
      run: go test -v -coverprofile=coverage-go.txt ./...

    - name: Run Rust tests
      run: cargo test --verbose

    - name: Build Go collector
      run: go build -v -o bin/collector cmd/collector/main.go

    - name: Build Rust CLI
      run: cargo build --release --verbose

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage-go.txt
        flags: go
        fail_ci_if_error: false

  mod-tidy:
    name: Go mod tidy
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - uses: actions/setup-go@v5
      with:
        go-version: '1.26'

    - name: Check go mod tidy
      run: |
        go mod tidy
        if [ -n "$(git status --porcelain go.mod go.sum)" ]; then
          echo "[!] go.mod or go.sum is not tidy"
          git diff go.mod go.sum
          exit 1
        fi

  cross-compile:
    name: Cross-compile ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: linux/arm64
            goarch: arm64
          - target: darwin/amd64
            goarch: amd64
            goos: darwin
          - target: windows/amd64
            goarch: amd64
            goos: windows

    steps:
    - uses: actions/checkout@v7

    - uses: actions/setup-go@v5
      with:
        go-version: '1.26'

    - name: Cross-compile Go collector
      env:
        GOOS: ${{ matrix.goos || 'linux' }}
        GOARCH: ${{ matrix.goarch }}
      run: go build -o /dev/null cmd/collector/main.go

  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@v7

    - uses: actions/setup-go@v5
      with:
        go-version: '1.26'

    - uses: actions-rust-lang/setup-rust-toolchain@v1

    - name: Build (Unix)
      if: runner.os != 'Windows'
      run: make build

    - name: Build (Windows)
      if: runner.os == 'Windows'
      shell: bash
      run: |
        mkdir -p bin
        go build -o bin/collector.exe cmd/collector/main.go
        cargo build --release
        cp target/release/k8sync.exe bin/ || cp target/release/k8sync bin/

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: k8sync-${{ matrix.os }}
        path: |
          bin/collector*
          bin/k8sync*
          target/release/k8sync*
        retention-days: 7

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7

    - uses: actions/setup-go@v5
      with:
        go-version: '1.26'

    - uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        components: rustfmt, clippy

    - name: Run golangci-lint
      run: |
        go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
        golangci-lint run --timeout=5m

    - name: Rust clippy
      run: cargo clippy --all-targets --all-features -- -D warnings
